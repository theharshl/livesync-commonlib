name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/vrtmrz/livesync-commonlib.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "new_commits=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Open PR with upstream changes
        if: steps.check.outputs.new_commits != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="upstream-sync/$(date +%Y-%m-%d)"
          PRE_MERGE_SHA=$(git rev-parse HEAD)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if git merge upstream/main --no-edit; then
            # GITHUB_TOKEN can never push changes to .github/workflows/*, and
            # upstream's CI workflows are tailored to their own repo anyway -
            # always revert that directory back to the fork's own version.
            WORKFLOWS_EXCLUDED=""
            rm -rf .github/workflows
            git checkout "$PRE_MERGE_SHA" -- .github/workflows 2>/dev/null || true
            if ! git diff --quiet HEAD -- .github/workflows; then
              git add -A .github/workflows
              git commit --amend --no-edit
              WORKFLOWS_EXCLUDED=1
            fi

            BODY="Automated upstream sync from [vrtmrz/livesync-commonlib](https://github.com/vrtmrz/livesync-commonlib).

          No merge conflicts detected against \`main\`. Note: this fork's patch
          (fix for the \$getReplicator crash) lives on
          \`fix/direct-file-manipulator-replicator-stub\`, not on \`main\` —
          merging this PR does not update that branch. If you want the patch
          based on this newer upstream commit, rebase it separately by hand."
            if [ -n "$WORKFLOWS_EXCLUDED" ]; then
              BODY="$BODY

          ⚠️ Upstream changed files under \`.github/workflows/\` — those changes were **excluded** from this sync (GITHUB_TOKEN can't push workflow-file changes, and upstream's CI setup is specific to their own repo). Review upstream's workflow diff by hand if any of it is worth adopting."
            fi
            DRAFT_FLAG=""
          else
            git add -A
            git commit -m "chore: upstream sync (conflicts need manual resolution)"
            BODY="⚠️ Automated upstream sync from [vrtmrz/livesync-commonlib](https://github.com/vrtmrz/livesync-commonlib).

          **Merge conflicts detected.** Resolve conflicts manually before merging — do not merge this PR as-is."
            DRAFT_FLAG="--draft"
          fi

          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync upstream $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH" \
            $DRAFT_FLAG \
          || echo "PR already exists for this branch"
